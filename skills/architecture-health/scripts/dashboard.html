<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge System Health</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0A0A0A;
    --border: #333333;
    --gold: #C9A962;
    --text: #FFFFFF;
    --text-sec: #777777;
    --text-muted: #444444;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --gray: #555555;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 32px 40px;
    gap: 24px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .header .timestamp {
    font-size: 12px;
    color: var(--text-sec);
  }

  /* Pipeline */
  .pipeline {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 16px 32px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pipe-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 12px;
    border: 1px solid;
    min-width: 100px;
  }
  .pipe-node .label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .pipe-node .count {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
  }
  .pipe-node .sub {
    font-size: 9px;
    color: var(--text-sec);
  }
  .pipe-arrow {
    font-size: 20px;
    color: var(--text-muted);
  }

  /* Metrics */
  .metrics-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex: 1;
    min-height: 0;
  }
  .metrics-row {
    display: flex;
    gap: 16px;
    flex: 1;
    min-height: 0;
  }
  .metric-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 16px 20px;
    border: 1px solid var(--border);
  }
  .metric-card .m-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sec);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .metric-card .m-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
  }
  .metric-card .m-bar {
    width: 100%;
    height: 4px;
    background: #1a1a1a;
    overflow: hidden;
  }
  .metric-card .m-bar-fill {
    height: 100%;
    transition: width 0.6s ease;
  }
  .metric-card .m-en {
    font-size: 10px;
    color: var(--text-muted);
  }

  /* Bottom */
  .bottom {
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .bottom-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px 20px;
    border: 1px solid var(--border);
  }
  .bottom-card .card-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Status bars */
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-row .s-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-sec);
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 80px;
    flex-shrink: 0;
  }
  .status-bar {
    flex: 1;
    height: 16px;
    background: #1a1a1a;
    display: flex;
    overflow: hidden;
  }
  .status-seg { height: 100%; }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    color: var(--text-sec);
  }
  .legend-dot { width: 10px; height: 10px; flex-shrink: 0; }

  /* Issues */
  .issue-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .issue-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .issue-text {
    font-size: 11px;
    line-height: 1.4;
  }
</style>
</head>
<body>

<script>
const DATA = /*__DATA__*/{
  "generated_at": "2026-03-28T10:00:00",
  "total_counts": {"lessons": 2, "research": 4, "design": 6, "rules": 17, "skills": 14},
  "health_metrics": {
    "lesson_spec_rate": 0.5,
    "merge_ratio": 0.5,
    "promotion_rate": 0.0,
    "design_landed_rate": 0.167,
    "source_cases_density": 0.5,
    "knowledge_source_diversity": 0.0
  },
  "pipeline_counts": {
    "eat_sourced": 5,
    "brainstorm_sourced": 6,
    "notes_sourced": 0,
    "other_sourced": 6
  },
  "status_distribution": {
    "lessons": {"active": 1, "proposed": 0, "unknown": 1},
    "research": {"active": 0, "proposed": 0, "unknown": 4},
    "design": {"active": 1, "proposed": 5}
  },
  "timeline": [],
  "issues": [
    {"severity": "critical", "message": "\u664b\u5347\u7ba1\u9053\u4ece\u672a\u8fd0\u884c\uff1a0 \u6761 rule \u6765\u81ea notes \u664b\u5347"},
    {"severity": "warning", "message": "1/2 lessons \u7f3a\u5c11\u6807\u51c6\u5143\u6570\u636e\u5b57\u6bb5"},
    {"severity": "warning", "message": "5/6 design notes \u4ecd\u4e3a proposed \u72b6\u6001"}
  ]
}/*__DATA__*/;

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function hColor(v, g, y) { return v > g ? 'var(--green)' : v > y ? 'var(--yellow)' : 'var(--red)'; }

document.body.innerHTML = '';

const hm = DATA.health_metrics;
const pc = DATA.pipeline_counts;
const tc = DATA.total_counts;

// ── Header ──
const header = document.createElement('div');
header.className = 'header';
header.innerHTML = `<h1>KNOWLEDGE SYSTEM HEALTH</h1><span class="timestamp">${DATA.generated_at}</span>`;
document.body.appendChild(header);

// ── Pipeline ──
const pipeline = document.createElement('div');
pipeline.className = 'pipeline';
document.body.appendChild(pipeline);

const lc = DATA.lesson_capture || {};
const captureActive = lc.hooks_exist && lc.settings_statusline_integrated;
const captureCount = captureActive ? (lc.signal_state ? lc.signal_state.signal_count : 0) : 0;

const cs = DATA.consolidation || {};
const consolidateActive = cs.script_exists && cs.settings_session_end_hook;
const consolidateRuns = cs.state ? cs.state.total_runs : 0;
const consolidateSub = consolidateActive
  ? (consolidateRuns > 0 ? `${consolidateRuns} runs` : 'ready')
  : '\u672a\u6fc0\u6d3b';

const pipeNodes = [
  { label: 'EAT', count: pc.eat_sourced, sub: 'sourced', color: 'var(--gold)' },
  { label: 'BRAINSTORM', count: pc.brainstorm_sourced, sub: 'sourced', color: 'var(--gold)' },
  { label: 'CAPTURE', count: captureActive ? '\u2713' : '\u2717', sub: captureActive ? `${captureCount} signals` : '\u672a\u6fc0\u6d3b', color: captureActive ? 'var(--green)' : 'var(--red)' },
  { label: 'NOTES', count: tc.lessons + tc.research + tc.design, sub: `lessons ${tc.lessons} \u00b7 research ${tc.research} \u00b7 design ${tc.design}`, color: 'var(--green)' },
  { label: 'CONSOLIDATE', count: consolidateActive ? '\u2713' : '\u2717', sub: consolidateSub, color: consolidateActive ? 'var(--green)' : 'var(--red)' },
  { label: 'PROMOTION', count: pc.notes_sourced, sub: pc.notes_sourced === 0 ? '\u672a\u6fc0\u6d3b' : 'active', color: pc.notes_sourced === 0 ? 'var(--red)' : 'var(--green)' },
  { label: 'RULES / SKILLS', count: `${tc.rules} / ${tc.skills}`, sub: `${pc.notes_sourced} from notes`, color: 'var(--blue)' },
];

pipeNodes.forEach((n, i) => {
  if (i > 0) pipeline.insertAdjacentHTML('beforeend', '<span class="pipe-arrow">\u2192</span>');
  const node = document.createElement('div');
  node.className = 'pipe-node';
  node.style.borderColor = n.color;
  node.innerHTML = `
    <span class="label" style="color:${n.color}">${n.label}</span>
    <span class="count">${n.count}</span>
    <span class="sub"${n.label === 'PROMOTION' && pc.notes_sourced === 0 ? ' style="color:var(--red)"' : ''}>${n.sub}</span>
  `;
  pipeline.appendChild(node);
});

// ── Metrics ──
const metricsSection = document.createElement('div');
metricsSection.className = 'metrics-section';
document.body.appendChild(metricsSection);

const metricDefs = [
  [
    { key: 'lesson_spec_rate', zh: 'LESSON \u89c4\u8303\u7387', en: 'Spec Compliance', g: 0.8, y: 0.5 },
    { key: 'merge_ratio', zh: '\u5f52\u5e76\u7387', en: 'Merge Ratio', g: 0.7, y: 0.4 },
    { key: 'promotion_rate', zh: '\u664b\u5347\u8f6c\u5316\u7387', en: 'Promotion Rate', g: 0.05, y: 0.001 },
  ],
  [
    { key: 'design_landed_rate', zh: 'DESIGN \u843d\u5730\u7387', en: 'Design Landed Rate', g: 0.3, y: 0.1 },
    { key: 'source_cases_density', zh: 'SOURCE CASES \u5bc6\u5ea6', en: 'Cases Density (avg)', g: 2, y: 1 },
    { key: 'knowledge_source_diversity', zh: '\u77e5\u8bc6\u6765\u6e90\u591a\u6837\u6027', en: 'Source Diversity', g: 0.2, y: 0.05 },
  ],
];

metricDefs.forEach(row => {
  const rowEl = document.createElement('div');
  rowEl.className = 'metrics-row';
  row.forEach(m => {
    const v = hm[m.key];
    const color = hColor(v, m.g, m.y);
    const isDensity = m.key === 'source_cases_density';
    const display = isDensity ? v.toFixed(1) : (v * 100).toFixed(0) + '%';
    const barW = isDensity ? Math.min(v / 4 * 100, 100) : Math.min(v * 100, 100);

    const card = document.createElement('div');
    card.className = 'metric-card';
    card.innerHTML = `
      <div class="m-label">${esc(m.zh)}</div>
      <div class="m-value" style="color:${color}">${display}</div>
      <div class="m-bar"><div class="m-bar-fill" style="width:${barW}%;background:${color}"></div></div>
      <div class="m-en">${esc(m.en)}</div>
    `;
    rowEl.appendChild(card);
  });
  metricsSection.appendChild(rowEl);
});

// ── Bottom: Status + Issues ──
const bottom = document.createElement('div');
bottom.className = 'bottom';
document.body.appendChild(bottom);

// Status Distribution
const statusCard = document.createElement('div');
statusCard.className = 'bottom-card';
statusCard.innerHTML = '<div class="card-title">NOTES \u72b6\u6001\u5206\u5e03</div>';
bottom.appendChild(statusCard);

const statusColors = { active: 'var(--green)', proposed: 'var(--blue)', 'candidate-rule': 'var(--yellow)', stale: 'var(--red)', unknown: 'var(--gray)' };
const allStatuses = new Set();

Object.entries(DATA.status_distribution).forEach(([cat, dist]) => {
  const total = Object.values(dist).reduce((a, b) => a + b, 0);
  if (total === 0) return;
  Object.keys(dist).forEach(k => { if (dist[k] > 0) allStatuses.add(k); });

  const row = document.createElement('div');
  row.className = 'status-row';
  row.innerHTML = `<span class="s-label">${cat.toUpperCase()}</span>`;
  const bar = document.createElement('div');
  bar.className = 'status-bar';

  Object.entries(dist).forEach(([status, count]) => {
    if (count === 0) return;
    const seg = document.createElement('div');
    seg.className = 'status-seg';
    seg.style.width = (count / total * 100) + '%';
    seg.style.background = statusColors[status] || statusColors.unknown;
    seg.title = `${status}: ${count}`;
    bar.appendChild(seg);
  });
  row.appendChild(bar);
  statusCard.appendChild(row);
});

const legend = document.createElement('div');
legend.className = 'legend';
['active', 'proposed', 'candidate-rule', 'stale', 'unknown'].forEach(s => {
  if (!allStatuses.has(s)) return;
  legend.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:${statusColors[s]}"></span>${s}</span>`;
});
statusCard.appendChild(legend);

// Lesson Capture Status
const captureCard = document.createElement('div');
captureCard.className = 'bottom-card';
captureCard.innerHTML = '<div class="card-title">LESSON CAPTURE</div>';
bottom.appendChild(captureCard);

const captureChecks = [
  { label: 'Signal Detector', ok: lc.signal_detector_exists },
  { label: 'StatusLine Integration', ok: lc.settings_statusline_integrated },
];
captureChecks.forEach(c => {
  const row = document.createElement('div');
  row.className = 'issue-row';
  const color = c.ok ? 'var(--green)' : 'var(--red)';
  const icon = c.ok ? '\u2713' : '\u2717';
  row.innerHTML = `<span class="issue-dot" style="background:${color}"></span><span class="issue-text" style="color:${color}">${icon} ${esc(c.label)}</span>`;
  captureCard.appendChild(row);
});

const captureInfo = [
  { label: 'Lesson Gate Script', value: lc.lesson_gate_exists ? 'present (manual tool)' : 'missing' },
  { label: 'Stop Hook Config', value: lc.settings_stop_hook_optional ? 'optional wiring present' : 'not wired (expected)' },
];
captureInfo.forEach(info => {
  const row = document.createElement('div');
  row.className = 'issue-row';
  row.innerHTML = `<span class="issue-text" style="color:var(--text-sec);font-size:10px">${esc(info.label)}: ${esc(info.value)}</span>`;
  captureCard.appendChild(row);
});

if (lc.signal_types_detected && lc.signal_types_detected.length > 0) {
  const typesRow = document.createElement('div');
  typesRow.className = 'issue-row';
  typesRow.style.marginTop = '4px';
  typesRow.innerHTML = `<span class="issue-text" style="color:var(--text-sec);font-size:10px">Detected: ${lc.signal_types_detected.join(', ')}</span>`;
  captureCard.appendChild(typesRow);
}

// Consolidation Status
const consCard = document.createElement('div');
consCard.className = 'bottom-card';
consCard.innerHTML = '<div class="card-title">CONSOLIDATION</div>';
bottom.appendChild(consCard);

const consChecks = [
  { label: 'consolidate.py', ok: cs.script_exists },
  { label: 'SessionEnd Hook', ok: cs.settings_session_end_hook },
];
consChecks.forEach(c => {
  const row = document.createElement('div');
  row.className = 'issue-row';
  const color = c.ok ? 'var(--green)' : 'var(--red)';
  const icon = c.ok ? '\u2713' : '\u2717';
  row.innerHTML = `<span class="issue-dot" style="background:${color}"></span><span class="issue-text" style="color:${color}">${icon} ${esc(c.label)}</span>`;
  consCard.appendChild(row);
});

if (cs.state && cs.state.total_runs > 0) {
  const st = cs.state;
  const infoRow = document.createElement('div');
  infoRow.className = 'issue-row';
  infoRow.style.marginTop = '4px';
  infoRow.innerHTML = `<span class="issue-text" style="color:var(--text-sec);font-size:10px">Runs: ${st.total_runs} \u00b7 Last: ${st.hours_since_last_run}h ago \u00b7 Pending: ${st.session_count} sessions</span>`;
  consCard.appendChild(infoRow);
}

if (cs.last_report && cs.last_report.summary) {
  const runtimeInfo = cs.last_report.summary.runtime;
  if (runtimeInfo && runtimeInfo.pruned_files > 0) {
    const pruneRow = document.createElement('div');
    pruneRow.className = 'issue-row';
    pruneRow.innerHTML = `<span class="issue-text" style="color:var(--text-sec);font-size:10px">Last: pruned ${runtimeInfo.pruned_files} files (${runtimeInfo.freed_kb}KB)</span>`;
    consCard.appendChild(pruneRow);
  }
}

// Issues
const issuesCard = document.createElement('div');
issuesCard.className = 'bottom-card';
issuesCard.innerHTML = '<div class="card-title">ISSUES</div>';
bottom.appendChild(issuesCard);

DATA.issues.forEach(issue => {
  const sev = issue.severity || 'info';
  const color = sev === 'critical' ? 'var(--red)' : sev === 'warning' ? 'var(--yellow)' : 'var(--blue)';
  const row = document.createElement('div');
  row.className = 'issue-row';
  row.innerHTML = `<span class="issue-dot" style="background:${color}"></span><span class="issue-text" style="color:${color}">${esc(issue.message)}</span>`;
  issuesCard.appendChild(row);
});
</script>

</body>
</html>
