<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metrics Weekly</title>
  <style>
    :root {
      --bg: #0A0A0A;
      --panel: #111111;
      --panel-2: #151515;
      --text: #FFFFFF;
      --muted: #9A9A9A;
      --border: #333333;
      --gold: #C9A962;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --gray-dot: #5A5A5A;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top right, rgba(201, 169, 98, 0.12), transparent 28%), var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      min-height: 100vh;
    }

    .page {
      max-width: 1360px;
      margin: 0 auto;
      padding: 32px 20px 40px;
    }

    .section {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 100%), var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title {
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin: 0;
    }

    .subtitle,
    .meta,
    .label,
    .small {
      color: var(--muted);
    }

    .meta {
      text-align: right;
      font-size: 13px;
      line-height: 1.6;
    }

    .week-selector {
      font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 13px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      outline: none;
    }

    .week-selector:hover,
    .week-selector:focus {
      border-color: var(--gold);
    }

    .loading-state {
      color: var(--muted);
      font-size: 16px;
      padding: 40px 0;
      text-align: center;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .card-value {
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 700;
      line-height: 1;
    }

    .progress-track,
    .bar-track {
      width: 100%;
      background: #1D1D1D;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-track {
      height: 10px;
    }

    .progress-fill,
    .bar-fill {
      height: 100%;
      border-radius: inherit;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-title {
      margin: 0;
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 20px;
      letter-spacing: 0.04em;
    }

    .trend-chart {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
      min-height: 280px;
      padding-top: 8px;
    }

    .trend-day {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: end;
      gap: 10px;
      height: 100%;
    }

    .trend-bars {
      height: 220px;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 8px;
      padding: 0 4px;
      border-bottom: 1px solid var(--border);
    }

    .trend-bar {
      width: 22px;
      min-height: 6px;
      border-radius: 10px 10px 4px 4px;
      opacity: 0.95;
    }

    .trend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gray-dot);
      margin-bottom: 6px;
    }

    .trend-date {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    .event-list,
    .issues-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mono {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .value-block {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .bar-track {
      height: 8px;
      flex: 1;
      min-width: 70px;
    }

    .bar-value,
    .cell-right {
      text-align: right;
      font-size: 12px;
    }

    .tab-group {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .tab-btn {
      border: 0;
      border-radius: 999px;
      padding: 7px 12px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      letter-spacing: 0.04em;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      background: rgba(201, 169, 98, 0.18);
      color: var(--text);
    }

    .hook-card {
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .hook-card-header {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(180px, 1fr) auto auto 26px;
      align-items: center;
      gap: 14px;
      text-align: left;
      cursor: pointer;
    }

    .hook-title-block {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hook-title {
      min-width: 0;
      font-size: 14px;
    }

    .category-tag {
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hook-stat-block {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hook-bar-track {
      position: relative;
      height: 10px;
      flex: 1;
      min-width: 90px;
      background: #1D1D1D;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .hook-bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(201, 169, 98, 0.85), rgba(59, 130, 246, 0.92));
    }

    .hook-count-value {
      min-width: 48px;
      text-align: right;
      font-size: 12px;
    }

    .hook-kpis {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hook-kpi {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .hook-kpi-strong {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .expand-arrow {
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      transition: transform 0.24s ease, color 0.24s ease;
    }

    .hook-card.is-open .expand-arrow {
      color: var(--text);
      transform: rotate(180deg);
    }

    .hook-card-detail {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.28s ease, opacity 0.28s ease, padding 0.28s ease;
      padding: 0 18px;
    }

    .hook-card.is-open .hook-card-detail {
      max-height: 560px;
      opacity: 1;
      padding: 0 18px 18px;
    }

    .detail-content {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(260px, 0.9fr);
      gap: 18px;
      padding-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .detail-metric {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      min-height: 74px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .detail-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 18px;
      line-height: 1.1;
    }

    .detail-viz {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .viz-title {
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .stacked-bar {
      height: 14px;
      width: 100%;
      display: flex;
      overflow: hidden;
      background: #1D1D1D;
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .stacked-bar-segment {
      height: 100%;
      min-width: 0;
    }

    .stacked-legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .legend-row,
    .reason-row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      font-size: 12px;
    }

    .legend-dot,
    .reason-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .reason-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .reason-label {
      min-width: 0;
      color: var(--muted);
    }

    .analytics-empty {
      padding: 16px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .hook-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .event-row {
      display: grid;
      grid-template-columns: minmax(130px, 1fr) minmax(120px, 1.2fr) 64px;
      gap: 10px;
      align-items: center;
    }

    .issue-row {
      display: grid;
      grid-template-columns: 12px minmax(160px, auto) 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid rgba(51, 51, 51, 0.45);
    }

    .issue-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 4px;
    }

    .issue-title {
      font-size: 13px;
    }

    .issue-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .empty-state {
      color: var(--green);
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 22px;
      padding: 12px 0 4px;
    }

    @media (max-width: 1100px) {
      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 820px) {
      .page {
        padding: 20px 14px 28px;
      }

      .header,
      .section-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .meta {
        text-align: left;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .trend-chart {
        gap: 8px;
      }

      .tab-group {
        width: 100%;
      }

      .hook-controls {
        width: 100%;
        justify-content: flex-start;
      }

      .hook-card-header,
      .detail-content,
      .detail-grid,
      .event-row,
      .issue-row {
        grid-template-columns: 1fr;
      }

      .hook-card-header {
        gap: 12px;
      }

      .hook-kpis {
        justify-content: flex-start;
      }

      .hook-count-value,
      .bar-value,
      .cell-right {
        text-align: left;
      }

      .hook-card.is-open .hook-card-detail {
        max-height: 980px;
      }
    }

    .lang-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 2px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .lang-btn {
      border: 0;
      border-radius: 6px;
      padding: 4px 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      transition: background 0.2s, color 0.2s;
    }

    .lang-btn.active {
      background: rgba(201, 169, 98, 0.18);
      color: var(--text);
    }

    .hook-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      width: 100%;
    }

    .skill-desc, .rule-title {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.3;
      margin-top: 2px;
    }
  </style>
</head>

  <main class="page">
    <section class="section header">
      <div>
        <p id="page-subtitle" class="subtitle">Operational telemetry</p>
        <h1 id="page-title" class="title">METRICS WEEKLY</h1>
      </div>
      <div style="display:flex; align-items:flex-end; gap:16px;">
        <select id="week-selector" class="week-selector" style="display:none;"></select>
        <div class="lang-toggle">
          <button class="lang-btn" data-lang="zh">中文</button>
          <button class="lang-btn active" data-lang="en">EN</button>
        </div>
        <div id="header-meta" class="meta"></div>
      </div>
    </section>

    <section class="section">
      <div id="summary-cards" class="summary-grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 id="section-daily-trend" class="section-title">Daily Trend</h2>
        <div id="trend-meta" class="small"></div>
      </div>
      <div id="trend-chart" class="trend-chart"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 id="section-hook-analytics" class="section-title">Hook Analytics</h2>
        <div class="hook-controls" style="display:flex; gap:12px; align-items:center;">
          <div class="tab-group" id="hook-tabs">
            <button class="tab-btn active" data-tab="all">All</button>
            <button class="tab-btn" data-tab="gate">Gate</button>
            <button class="tab-btn" data-tab="inject">Inject</button>
            <button class="tab-btn" data-tab="monitor">Monitor</button>
            <button class="tab-btn" data-tab="other">Other</button>
          </div>
          <select id="hook-sort" class="week-selector">
            <option value="run_count">by Run Count</option>
            <option value="error_rate">by Error Rate</option>
            <option value="avg_duration">by Avg Duration</option>
          </select>
        </div>
      </div>
      <div id="hook-analytics"></div>
    </section>

    <section class='section'>
      <div class='section-head'>
        <h2 id='section-rules-usage' class='section-title'>Rules Usage</h2>
        <div id='rules-count' class='small'></div>
      </div>
      <div id='rules-usage'></div>
    </section>

    <section class='section'>
      <div class='section-head'>
        <h2 id='section-skills-usage' class='section-title'>Skills Usage</h2>
        <div id='skills-count' class='small'></div>
      </div>
      <div id='skills-usage'></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 id="section-event-distribution" class="section-title">Event Distribution</h2>
        <div id="event-total" class="small"></div>
      </div>
      <div id="event-distribution" class="event-list"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 id="section-issues-panel" class="section-title">Issues Panel</h2>
        <div id="issues-subtitle" class="small">Failures, gate pressure, low activity</div>
      </div>
      <div id="issues-panel"></div>
    </section>
  </main>

,"dashboard.viz.gate_decision_mix":"Gate Decision Mix","dashboard.viz.outcome_mix":"Outcome Mix","dashboard.viz.block_reasons":"Block Reasons","dashboard.viz.allowed":"Allowed","dashboard.viz.blocked":"Blocked","dashboard.viz.success":"Success","dashboard.viz.error":"Error","dashboard.status.blocked":"blocked {0}%","dashboard.status.error":"error {0}","dashboard.status.success":"success {0}%","dashboard.empty.no_hooks":"No hooks available for this filter.","dashboard.empty.no_block_reasons":"No block reasons recorded","dashboard.issue.failures":"failures {0} · rate {1}","dashboard.issue.high_block_rate":"block rate {0} · top reason: {1}","dashboard.issue.low_activity":"low activity, active for only {0} days","dashboard.empty.no_issues":"No issues","dashboard.empty.no_data":"No data — tracking starts next session","dashboard.label.rules_tracked":"{0} rules tracked","dashboard.label.skills_tracked":"{0} skills tracked","dashboard.load_failed":"Load failed: {0}","dashboard.label.days":"days","dashboard.label.per_day":"/ day","dashboard.label.na":"n/a","dashboard.label.unknown":"unknown","dashboard.label.days_short":"d","dashboard.label.events_total":"{0} events","dashboard.trend.scale":"blue = sessions, gold = events / {0}","dashboard.tooltip.sessions":"sessions: {0}","dashboard.tooltip.total_events":"total_events: {0}"}}/*__I18N__*/;

    const COLORS = {
      gold: "#C9A962",
      green: "#22c55e",
      yellow: "#f59e0b",
      red: "#ef4444",
      blue: "#3b82f6",
      gray: "#5A5A5A"
    };

    const HOOK_CATEGORY_COLORS = {
      gate: "#ef4444",
      inject: "#3b82f6",
      monitor: "#22c55e",
      other: "#5A5A5A"
    };

    const STATE = { tab: "all", sort: "run_count", expanded: new Set() };
    let currentLang = localStorage.getItem("metrics-lang") || "zh";
    let currentData = DATA;

    if (!I18N[currentLang]) {
      currentLang = "zh";
    }

    function t(key, ...args) {
      const dict = I18N[currentLang] || I18N["zh"] || {};
      let text = dict[key] || key;
      args.forEach((arg, i) => { text = text.replace(`{${i}}`, arg); });
      return text;
    }

    function n(value, fallback = 0) {
      return typeof value === "number" && Number.isFinite(value) ? value : fallback;
    }

    function formatNumber(value) {
      return new Intl.NumberFormat(currentLang === "zh" ? "zh-CN" : "en-US").format(n(value));
    }

    function formatPercent(value) {
      if (typeof value !== "number" || !Number.isFinite(value)) {
        return t("dashboard.label.na");
      }
      return `${(value * 100).toFixed(1)}%`;
    }

    function formatDate(value) {
      if (!value) {
        return "--";
      }
      return value.slice(5);
    }

    function successColor(rate) {
      if (typeof rate !== "number") {
        return COLORS.gray;
      }
      if (rate > 0.95) {
        return COLORS.green;
      }
      if (rate > 0.8) {
        return COLORS.yellow;
      }
      return COLORS.red;
    }

    function createCard(title, value, detailHtml) {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <div class="card-title">${title}</div>
        <div class="card-value">${value}</div>
        <div>${detailHtml || ""}</div>
      `;
      return card;
    }

    function classifyHook(name) {
      const normalized = String(name || "").toLowerCase();
      if (normalized.includes("gate")) return "gate";
      if (normalized.includes("inject")) return "inject";
      if (normalized.includes("monitor")) return "monitor";
      return "other";
    }

    function formatMetricValue(key, value) {
      if (value == null) {
        return null;
      }
      if (key === "avg_duration_ms") {
        return `${formatNumber(value)} ms`;
      }
      if (key === "avg_daily_runs") {
        return n(value).toFixed(1);
      }
      return formatNumber(value);
    }

    function metricCard(label, value) {
      return `
        <div class="detail-metric">
          <div class="detail-label">${label}</div>
          <div class="detail-value">${value}</div>
        </div>
      `;
    }

    function renderLegendRow(color, label, value) {
      return `
        <div class="legend-row">
          <div class="legend-dot" style="background:${color};"></div>
          <div>${label}</div>
          <div>${value}</div>
        </div>
      `;
    }

    function renderReasonRows(reasons) {
      if (!Array.isArray(reasons) || !reasons.length) {
        return `<div class="reason-row"><div class="reason-dot" style="background:${COLORS.gray};"></div><div class="reason-label">${t("dashboard.empty.no_block_reasons")}</div><div>--</div></div>`;
      }

      return reasons.map((item) => `
        <div class="reason-row">
          <div class="reason-dot" style="background:${COLORS.red};"></div>
          <div class="reason-label mono">${item.reason || t("dashboard.label.unknown")}</div>
          <div>${formatNumber(item.count)}</div>
        </div>
      `).join("");
    }

    function renderStackedBar(segments) {
      const total = segments.reduce((sum, segment) => sum + n(segment.value), 0);
      return `
        <div class="stacked-bar">
          ${segments.map((segment) => {
            const width = total > 0 ? Math.max(0, (n(segment.value) / total) * 100) : 0;
            return `<div class="stacked-bar-segment" style="width:${width}%; background:${segment.color};"></div>`;
          }).join("")}
        </div>
      `;
    }

    function sortHooks(entries, sortKey) {
      const sorted = [...entries];
      sorted.sort((a, b) => {
        const aStats = a[1] || {};
        const bStats = b[1] || {};
        if (sortKey === "error_rate") {
          const aRate = n(aStats.run_count) > 0 ? n(aStats.error_count) / n(aStats.run_count) : 0;
          const bRate = n(bStats.run_count) > 0 ? n(bStats.error_count) / n(bStats.run_count) : 0;
          return bRate - aRate || n(bStats.run_count) - n(aStats.run_count);
        }
        if (sortKey === "avg_duration") {
          return n(bStats.avg_duration_ms) - n(aStats.avg_duration_ms) || n(bStats.run_count) - n(aStats.run_count);
        }
        return n(bStats.run_count) - n(aStats.run_count);
      });
      return sorted;
    }

    // IDs of all dynamic containers that need clearing on re-render
    const DYNAMIC_IDS = ["header-meta", "summary-cards", "trend-chart", "trend-meta", "hook-analytics", "rules-usage", "rules-count", "skills-usage", "skills-count", "event-distribution", "event-total", "issues-panel"];

    function clearAll() {
      DYNAMIC_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = "";
      });
    }

    function renderStaticText() {
      document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
      document.title = t("dashboard.page_title");

      const textMap = {
        "page-subtitle": t("dashboard.hero_subtitle"),
        "page-title": t("dashboard.hero_title"),
        "section-daily-trend": t("dashboard.section.daily_trend"),
        "section-hook-analytics": t("dashboard.section.hook_analytics"),
        "section-rules-usage": t("dashboard.section.rules_usage"),
        "section-skills-usage": t("dashboard.section.skills_usage"),
        "section-event-distribution": t("dashboard.section.event_distribution"),
        "section-issues-panel": t("dashboard.section.issues_panel"),
        "issues-subtitle": t("dashboard.section.issues_subtitle")
      };

      Object.entries(textMap).forEach(([id, text]) => {
        const el = document.getElementById(id);
        if (el) {
          el.textContent = text;
        }
      });

      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === currentLang);
      });

      document.querySelectorAll("#hook-tabs .tab-btn").forEach((button) => {
        const key = button.dataset.tab;
        button.textContent = t(`dashboard.tab.${key}`);
      });

      const sortSelect = document.getElementById("hook-sort");
      if (sortSelect) {
        Array.from(sortSelect.options).forEach((option) => {
          option.textContent = t(`dashboard.sort.${option.value}`);
        });
      }
    }

    function renderHeader(data) {
      const period = data.period || {};
      const meta = document.getElementById("header-meta");
      meta.innerHTML = `
        <div>${period.start || "--"} ~ ${period.end || "--"}</div>
        <div>${t("dashboard.valid_data", formatNumber(data.data_days))}</div>
      `;
    }

    function renderSummary(data) {
      const summary = data.summary || {};
      const cards = document.getElementById("summary-cards");
      const rate = summary.overall_success_rate;
      const rateColor = successColor(rate);
      const rateWidth = typeof rate === "number" ? Math.max(0, Math.min(100, rate * 100)) : 0;

      cards.appendChild(createCard(t("dashboard.card.sessions"), formatNumber(summary.sessions), `<div class="small">${t("dashboard.card.sessions_detail")}</div>`));
      cards.appendChild(createCard(t("dashboard.card.events"), formatNumber(summary.total_events), `<div class="small">${t("dashboard.card.events_detail")}</div>`));
      cards.appendChild(
        createCard(
          t("dashboard.card.success_rate"),
          formatPercent(rate),
          `<div class="progress-track"><div class="progress-fill" style="width:${rateWidth}%; background:${rateColor};"></div></div>`
        )
      );
      cards.appendChild(
        createCard(
          t("dashboard.card.avg_duration"),
          summary.overall_avg_duration_ms == null ? t("dashboard.label.na") : `${formatNumber(summary.overall_avg_duration_ms)} ms`,
          `<div class="small">${t("dashboard.card.avg_duration_detail")}</div>`
        )
      );
    }

    function renderTrend(data) {
      const trend = Array.isArray(data.daily_trend) ? data.daily_trend : [];
      const trendChart = document.getElementById("trend-chart");
      const maxSessions = Math.max(0, ...trend.map((item) => n(item.sessions)));
      const maxEvents = Math.max(0, ...trend.map((item) => n(item.total_events)));
      const eventScale = maxEvents > 0 ? Math.max(1, Math.ceil(maxEvents / Math.max(1, maxSessions || 8))) : 1;
      const normalizedMax = Math.max(1, ...trend.map((item) => Math.max(n(item.sessions), n(item.total_events) / eventScale)));

      document.getElementById("trend-meta").textContent = t("dashboard.trend.scale", eventScale);

      trend.forEach((item) => {
        const day = document.createElement("div");
        day.className = "trend-day";

        const sessions = n(item.sessions);
        const totalEvents = n(item.total_events);
        const noData = sessions === 0 && totalEvents === 0;

        if (noData) {
          day.innerHTML = `
            <div class="trend-bars">
              <div class="trend-dot"></div>
            </div>
            <div class="trend-date">${formatDate(item.date)}</div>
          `;
        } else {
          const sessionHeight = `${Math.max(6, (sessions / normalizedMax) * 100)}%`;
          const eventHeight = `${Math.max(6, ((totalEvents / eventScale) / normalizedMax) * 100)}%`;
          day.innerHTML = `
            <div class="trend-bars">
              <div class="trend-bar" style="height:${sessionHeight}; background:${COLORS.blue};" title="${t("dashboard.tooltip.sessions", sessions)}"></div>
              <div class="trend-bar" style="height:${eventHeight}; background:${COLORS.gold};" title="${t("dashboard.tooltip.total_events", totalEvents)}"></div>
            </div>
            <div class="trend-date">${formatDate(item.date)}</div>
          `;
        }

        trendChart.appendChild(day);
      });
    }

    function renderHookAnalytics(data, state) {
      const root = document.getElementById("hook-analytics");
      const tabButtons = document.querySelectorAll("#hook-tabs .tab-btn");
      const sortSelect = document.getElementById("hook-sort");
      const byHook = data.by_hook || {};

      tabButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === state.tab);
      });

      if (sortSelect) {
        sortSelect.value = state.sort;
      }

      const filtered = Object.entries(byHook).filter(([hook]) => {
        const category = classifyHook(hook);
        return state.tab === "all" || category === state.tab;
      });
      const hooks = sortHooks(filtered, state.sort);
      const maxRun = Math.max(1, ...hooks.map(([, stats]) => n(stats.run_count)));

      if (!hooks.length) {
        root.innerHTML = `<div class="analytics-empty">${t("dashboard.empty.no_hooks")}</div>`;
        return;
      }

      root.innerHTML = hooks.map(([hook, stats]) => {
        const category = classifyHook(hook);
        const categoryColor = HOOK_CATEGORY_COLORS[category];
        const runCount = n(stats.run_count);
        const errorCount = n(stats.error_count);
        const blockedCount = n(stats.blocked_count);
        const successCount = stats.success_count == null ? Math.max(0, runCount - errorCount - blockedCount) : n(stats.success_count);
        const allowedCount = stats.allowed_count == null ? Math.max(0, runCount - blockedCount) : n(stats.allowed_count);
        const activeDays = n(stats.active_days);
        const avgDuration = stats.avg_duration_ms == null ? t("dashboard.label.na") : `${formatNumber(stats.avg_duration_ms)} ms`;
        const barWidth = `${Math.max(3, (runCount / maxRun) * 100)}%`;
        const successRate = runCount > 0 ? successCount / runCount : 0;
        const blockedRate = runCount > 0 ? blockedCount / runCount : 0;
        const isOpen = state.expanded.has(hook);
        const hookDesc = currentLang === "zh"
          ? (stats.description_zh || stats.description_en || "")
          : (stats.description_en || stats.description_zh || "");

        const statusHtml = blockedCount > 0
          ? `<span class="hook-kpi-strong" style="color:${COLORS.red};">${t("dashboard.status.blocked", (blockedRate * 100).toFixed(0))}</span>`
          : errorCount > 0
            ? `<span class="hook-kpi-strong" style="color:${COLORS.red};">${t("dashboard.status.error", formatNumber(errorCount))}</span>`
            : `<span class="hook-kpi-strong" style="color:${COLORS.green};">${t("dashboard.status.success", (successRate * 100).toFixed(0))}</span>`;

        const metricEntries = [
          ["run_count", t("dashboard.metric.run_count")],
          ["success_count", t("dashboard.metric.success_count")],
          ["error_count", t("dashboard.metric.error_count")],
          ["blocked_count", t("dashboard.metric.blocked_count")],
          ["allowed_count", t("dashboard.metric.allowed_count")],
          ["avg_duration_ms", t("dashboard.metric.avg_duration_ms")],
          ["active_days", t("dashboard.metric.active_days")],
          ["avg_daily_runs", t("dashboard.metric.avg_daily_runs")]
        ].filter(([key]) => {
          if (key === "allowed_count") {
            return stats.allowed_count !== undefined || category === "gate";
          }
          return stats[key] !== undefined;
        }).map(([key, label]) => metricCard(label, formatMetricValue(key, key === "allowed_count" ? allowedCount : stats[key])));

        const vizSegments = category === "gate"
          ? [
              { color: COLORS.green, label: t("dashboard.viz.allowed"), value: allowedCount },
              { color: COLORS.red, label: t("dashboard.viz.blocked"), value: blockedCount }
            ]
          : [
              { color: COLORS.green, label: t("dashboard.viz.success"), value: successCount },
              { color: COLORS.red, label: t("dashboard.viz.error"), value: errorCount }
            ];

        const vizTitle = category === "gate" ? t("dashboard.viz.gate_decision_mix") : t("dashboard.viz.outcome_mix");
        const reasonBlock = category === "gate"
          ? `
              <div class="viz-title">${t("dashboard.viz.block_reasons")}</div>
              <div class="reason-list">${renderReasonRows(stats.block_reasons)}</div>
            `
          : "";

        return `
          <article class="hook-card${isOpen ? " is-open" : ""}">
            <button class="hook-card-header" type="button" data-hook="${hook}">
              <div class="hook-title-block">
                <span class="hook-title mono">${hook}</span>
                <span class="category-tag" style="color:${categoryColor};">${t(`dashboard.tab.${category}`)}</span>
                ${hookDesc ? `<div class="hook-desc">${hookDesc}</div>` : ""}
              </div>
              <div class="hook-stat-block">
                <div class="hook-bar-track"><div class="hook-bar-fill" style="width:${barWidth};"></div></div>
                <div class="hook-count-value">${formatNumber(runCount)}</div>
              </div>
              <div class="hook-kpis">
                ${statusHtml}
                <span class="hook-kpi">${t("dashboard.label.days")} ${formatNumber(activeDays)}</span>
                <span class="hook-kpi">${avgDuration}</span>
              </div>
              <div class="hook-kpi">${n(stats.avg_daily_runs).toFixed(1)} ${t("dashboard.label.per_day")}</div>
              <div class="expand-arrow">▾</div>
            </button>
            <div class="hook-card-detail">
              <div class="detail-content">
                <div class="detail-grid">${metricEntries.join("")}</div>
                <div class="detail-viz">
                  <div class="viz-title">${vizTitle}</div>
                  ${renderStackedBar(vizSegments)}
                  <div class="stacked-legend">
                    ${vizSegments.map((segment) => {
                      const total = vizSegments.reduce((sum, item) => sum + n(item.value), 0);
                      const percent = total > 0 ? `${((n(segment.value) / total) * 100).toFixed(1)}%` : "0.0%";
                      return renderLegendRow(segment.color, segment.label, `${formatNumber(segment.value)} · ${percent}`);
                    }).join("")}
                  </div>
                  ${reasonBlock}
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderRulesUsage(data) {
      const root = document.getElementById("rules-usage");
      const count = document.getElementById("rules-count");
      const byRule = data.by_rule && typeof data.by_rule === "object" ? data.by_rule : {};
      const entries = Object.entries(byRule).sort((a, b) => n(b[1] && b[1].inject_count) - n(a[1] && a[1].inject_count));

      if (!entries.length) {
        root.innerHTML = `<div class="analytics-empty">${t("dashboard.empty.no_data")}</div>`;
        return;
      }

      count.textContent = t("dashboard.label.rules_tracked", formatNumber(entries.length));
      const maxInjectCount = Math.max(1, ...entries.map(([, stats]) => n(stats && stats.inject_count)));

      entries.forEach(([rulePath, stats]) => {
        const injectCount = n(stats && stats.inject_count);
        const activeDays = n(stats && stats.active_days, null);
        const ruleTitle = stats.title || "";
        const row = document.createElement("div");
        row.className = "event-row";
        row.innerHTML = `
          <div>
            <div class="mono">${rulePath.startsWith("rules-library/") ? rulePath.slice("rules-library/".length) : rulePath}</div>
            ${ruleTitle ? `<div class="rule-title">${ruleTitle}</div>` : ""}
          </div>
          <div class="value-block">
            <div class="bar-track"><div class="bar-fill" style="width:${(injectCount / maxInjectCount) * 100}%; background:${COLORS.blue};"></div></div>
          </div>
          <div class="cell-right">${formatNumber(injectCount)}${activeDays == null ? "" : ` · ${formatNumber(activeDays)}${t("dashboard.label.days_short")}`}</div>
        `;
        root.appendChild(row);
      });
    }

    function renderSkillsUsage(data) {
      const root = document.getElementById("skills-usage");
      const count = document.getElementById("skills-count");
      const bySkill = data.by_skill && typeof data.by_skill === "object" ? data.by_skill : {};
      const entries = Object.entries(bySkill).sort((a, b) => n(b[1] && b[1].match_count) - n(a[1] && a[1].match_count));

      if (!entries.length) {
        root.innerHTML = `<div class="analytics-empty">${t("dashboard.empty.no_data")}</div>`;
        return;
      }

      count.textContent = t("dashboard.label.skills_tracked", formatNumber(entries.length));
      const maxMatchCount = Math.max(1, ...entries.map(([, stats]) => n(stats && stats.match_count)));

      entries.forEach(([skillName, stats]) => {
        const matchCount = n(stats && stats.match_count);
        const activeDays = n(stats && stats.active_days, null);
        const skillDesc = currentLang === "zh"
          ? (stats.description_zh || stats.description_en || "")
          : (stats.description_en || stats.description_zh || "");
        const row = document.createElement("div");
        row.className = "event-row";
        row.innerHTML = `
          <div>
            <div class="mono">${skillName}</div>
            ${skillDesc ? `<div class="skill-desc">${skillDesc}</div>` : ""}
          </div>
          <div class="value-block">
            <div class="bar-track"><div class="bar-fill" style="width:${(matchCount / maxMatchCount) * 100}%; background:${COLORS.gold};"></div></div>
          </div>
          <div class="cell-right">${formatNumber(matchCount)}${activeDays == null ? "" : ` · ${formatNumber(activeDays)}${t("dashboard.label.days_short")}`}</div>
        `;
        root.appendChild(row);
      });
    }

    function renderEventDistribution(data) {
      const root = document.getElementById("event-distribution");
      const entries = Object.entries(data.by_hook_event || {}).sort((a, b) => n(b[1]) - n(a[1]));
      const total = entries.reduce((sum, [, count]) => sum + n(count), 0);
      document.getElementById("event-total").textContent = t("dashboard.label.events_total", formatNumber(total));

      entries.forEach(([name, count]) => {
        const percentage = total > 0 ? (n(count) / total) * 100 : 0;
        const row = document.createElement("div");
        row.className = "event-row";
        row.innerHTML = `
          <div class="mono">${name}</div>
          <div class="value-block">
            <div class="bar-track"><div class="bar-fill" style="width:${percentage}%; background:${COLORS.gold};"></div></div>
          </div>
          <div class="cell-right">${percentage.toFixed(1)}%</div>
        `;
        root.appendChild(row);
      });
    }

    function issueItem(color, title, description) {
      const row = document.createElement("div");
      row.className = "issue-row";
      row.innerHTML = `
        <div class="issue-dot" style="background:${color};"></div>
        <div class="issue-title mono">${title}</div>
        <div class="issue-desc">${description}</div>
      `;
      return row;
    }

    function renderIssues(data) {
      const root = document.getElementById("issues-panel");
      const list = document.createElement("div");
      list.className = "issues-list";
      const hooks = Object.entries(data.by_hook || {});
      const issues = [];

      hooks.forEach(([hook, stats]) => {
        const runCount = Math.max(1, n(stats.run_count));
        const errorCount = n(stats.error_count);
        const blockedCount = n(stats.blocked_count);
        const activeDays = n(stats.active_days);
        const failureRate = errorCount > 0 ? errorCount / runCount : 0;
        const blockedRate = blockedCount > 0 ? blockedCount / runCount : 0;
        const topReason = Array.isArray(stats.block_reasons) && stats.block_reasons[0] ? stats.block_reasons[0].reason : t("dashboard.label.unknown");

        if (errorCount > 0) {
          issues.push(
            issueItem(
              COLORS.red,
              hook,
              t("dashboard.issue.failures", formatNumber(errorCount), formatPercent(failureRate))
            )
          );
        }

        if (blockedCount > 0 && blockedRate > 0.9) {
          issues.push(
            issueItem(
              COLORS.yellow,
              hook,
              t("dashboard.issue.high_block_rate", formatPercent(blockedRate), topReason)
            )
          );
        }

        if (data.data_days > 1 && activeDays <= 1) {
          issues.push(
            issueItem(
              COLORS.gray,
              hook,
              t("dashboard.issue.low_activity", formatNumber(activeDays))
            )
          );
        }
      });

      if (!issues.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = t("dashboard.empty.no_issues");
        root.appendChild(empty);
        return;
      }

      issues.forEach((node) => list.appendChild(node));
      root.appendChild(list);
    }

    function render(data) {
      currentData = data;
      clearAll();
      renderStaticText();
      renderHeader(data);
      renderSummary(data);
      renderTrend(data);
      renderHookAnalytics(data, STATE);
      renderRulesUsage(data);
      renderSkillsUsage(data);
      renderEventDistribution(data);
      renderIssues(data);
    }

    function bindHookAnalyticsEvents() {
      document.addEventListener("click", (event) => {
        const langButton = event.target.closest(".lang-btn");
        if (langButton) {
          currentLang = langButton.dataset.lang || "zh";
          if (!I18N[currentLang]) {
            currentLang = "zh";
          }
          localStorage.setItem("metrics-lang", currentLang);
          document.querySelectorAll(".lang-btn").forEach((button) => {
            button.classList.toggle("active", button.dataset.lang === currentLang);
          });
          renderStaticText();
          if (currentData) {
            render(currentData);
          }
          return;
        }

        const tabButton = event.target.closest("#hook-tabs .tab-btn");
        if (tabButton) {
          const nextTab = tabButton.dataset.tab || "all";
          if (STATE.tab !== nextTab) {
            STATE.tab = nextTab;
            renderHookAnalytics(currentData, STATE);
          }
          return;
        }

        const cardHeader = event.target.closest(".hook-card-header");
        if (cardHeader) {
          const hookName = cardHeader.dataset.hook;
          if (!hookName) {
            return;
          }
          if (STATE.expanded.has(hookName)) {
            STATE.expanded.delete(hookName);
          } else {
            STATE.expanded.add(hookName);
          }
          renderHookAnalytics(currentData, STATE);
        }
      });

      document.addEventListener("change", (event) => {
        const sortSelect = event.target.closest("#hook-sort");
        if (!sortSelect) {
          return;
        }
        STATE.sort = sortSelect.value || "run_count";
        renderHookAnalytics(currentData, STATE);
      });
    }

    // ── Mode detection & week switching ──

    const isLocalFile = window.location.protocol === "file:";

    async function fetchJSON(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`fetch ${url}: ${resp.status}`);
      return resp.json();
    }

    async function initOnline() {
      const selector = document.getElementById("week-selector");
      let weeks;
      try {
        weeks = await fetchJSON("weeks-index.json");
      } catch {
        // No index available — render embedded fallback
        render(DATA);
        return;
      }
      if (!Array.isArray(weeks) || weeks.length === 0) {
        render(DATA);
        return;
      }

      // Populate selector (newest first)
      selector.style.display = "";
      const sorted = [...weeks].sort().reverse();
      sorted.forEach(w => {
        const opt = document.createElement("option");
        opt.value = w;
        opt.textContent = w;
        selector.appendChild(opt);
      });

      // Load & render the latest week
      const latestWeek = sorted[0];
      selector.value = latestWeek;
      const data = await fetchJSON(`weekly/${latestWeek}.json`);
      render(data);

      // Switch handler
      selector.addEventListener("change", async () => {
        const weekDate = selector.value;
        try {
          const weekData = await fetchJSON(`weekly/${weekDate}.json`);
          render(weekData);
        } catch (err) {
          clearAll();
          renderStaticText();
          document.getElementById("header-meta").textContent = t("dashboard.load_failed", err.message);
        }
      });
    }

    renderStaticText();
    bindHookAnalyticsEvents();

    // Boot
    if (isLocalFile) {
      // Local mode: use /*__DATA__*/ injected data directly
      render(DATA);
    } else {
      // Online mode: fetch from server
      initOnline();
    }
  </script>
</body>
</html>
